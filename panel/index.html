<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel KeyAuth</title>
    <link rel="stylesheet" href="../assets/site.css" />
  </head>
  <body>
    <header class="header">
      <div class="container header-row">
        <a class="logo" href="../">KeyAuth<span>Cloud</span></a>
        <nav class="nav">
          <a href="../">Inicio</a>
          <a href="./">Painel</a>
        </nav>
      </div>
    </header>

    <main class="panel-wrap">
      <div class="container">
        <div class="panel-grid">
          <article class="card">
            <h2>Gerar Key no KeyAuth</h2>
            <form id="generateForm">
              <label>
                Cliente
                <input type="text" id="buyer" placeholder="Ex: Joao Silva" required />
              </label>
              <label>
                Duracao (dias)
                <select id="durationDays">
                  <option value="7">7</option>
                  <option value="30" selected>30</option>
                  <option value="90">90</option>
                  <option value="365">365</option>
                </select>
              </label>
              <label>
                Level
                <input type="number" id="level" min="1" value="1" />
              </label>
              <label>
                Mascara
                <input type="text" id="mask" value="*****-*****-*****-*****-*****" />
              </label>
              <label>
                Modo de caracteres
                <select id="charMode">
                  <option value="1" selected>Misto</option>
                  <option value="2">Maiusculo</option>
                  <option value="3">Minusculo</option>
                </select>
              </label>
              <button class="btn btn-primary" type="submit">Gerar</button>
            </form>
            <div id="generateStatus" class="status">Aguardando geracao.</div>
          </article>

          <article class="card">
            <h2>Validar Key Online</h2>
            <form id="validateForm">
              <label>
                Key
                <input type="text" id="licenseKey" placeholder="Cole a key" required />
              </label>
              <label>
                HWID (opcional)
                <input type="text" id="hwid" placeholder="Deixe em branco para auto" />
              </label>
              <button class="btn btn-primary" type="submit">Validar no KeyAuth</button>
            </form>
            <div id="validateStatus" class="status">Aguardando validacao.</div>
          </article>
        </div>

        <article class="card">
          <h2>Historico local do navegador</h2>
          <div class="actions">
            <button id="copyLastKey" class="btn btn-ghost" type="button">Copiar ultima key</button>
            <button id="clearHistory" class="btn btn-danger" type="button">Limpar historico</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Cliente</th>
                  <th>Duracao</th>
                  <th>Level</th>
                  <th>Key</th>
                </tr>
              </thead>
              <tbody id="historyBody">
                <tr>
                  <td colspan="5">Nenhuma key gerada ainda.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </article>

        <article class="card">
          <h2>Status de configuracao do deploy</h2>
          <div id="configStatus" class="status">Lendo configuracao...</div>
        </article>
      </div>
    </main>

    <script src="../assets/panel.js"></script>
  </body>
</html>
